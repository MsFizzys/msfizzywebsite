[build]
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_PATHS = "shop.html"
  SECRETS_SCAN_OMIT_KEYS = "SQUARE_APPLICATION_ID"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://web.squarecdn.com https://js.squareup.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://web.squarecdn.com; font-src 'self' https://fonts.gstatic.com https://web.squarecdn.com data:; frame-src https://web.squarecdn.com https://js.squareup.com; connect-src 'self' https://connect.squareup.com https://web.squarecdn.com https://cloudflareinsights.com; img-src 'self' data: https:;"
